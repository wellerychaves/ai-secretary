x-chatwoot-base: &chatwoot-base
    image: chatwoot/chatwoot:v4.12.1
    restart: unless-stopped
    env_file: .env
    depends_on:
        postgres:
            condition: service_healthy
        redis:
            condition: service_healthy
    volumes:
        - chatwoot_storage:/app/storage
    networks:
        - secretaria-net
    deploy:
        resources:
            limits:
                cpus: "1"
                memory: 1G
    logging: &default-logging
        driver: "json-file"
        options:
            max-size: "10m"
            max-file: "3"

services:
    postgres:
        image: pgvector/pgvector:pg16
        container_name: postgres_main
        restart: unless-stopped
        env_file: .env
        volumes:
            - postgres_data:/var/lib/postgresql/data
            - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
        networks:
            - secretaria-net
        deploy:
            resources:
                limits:
                    cpus: "1"
                    memory: 1G
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}",
                ]
            interval: 5s
            timeout: 5s
            retries: 3
            start_period: 10s
        logging:
            <<: *default-logging
        labels:
            - "project=secretaria-ia"
            - "service=database"

    redis:
        image: redis:8.6.2-alpine
        container_name: redis_main
        restart: unless-stopped
        command: >
            redis-server
            --requirepass ${REDIS_PASSWORD}
            --maxmemory 256mb
            --maxmemory-policy allkeys-lru
        volumes:
            - redis_data:/data
        networks:
            - secretaria-net
        deploy:
            resources:
                limits:
                    cpus: "0.5"
                    memory: 512M
        healthcheck:
            test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
            interval: 10s
            timeout: 5s
            retries: 3
            start_period: 5s
        logging:
            <<: *default-logging
        labels:
            - "project=secretaria-ia"
            - "service=cache"

    chatwoot-init:
        <<: *chatwoot-base
        container_name: chatwoot_init
        restart: "no"
        entrypoint: docker/entrypoints/rails.sh
        command: ["bundle", "exec", "rails", "db:chatwoot_prepare"]

    chatwoot-rails:
        <<: *chatwoot-base
        container_name: chatwoot_rails
        ports:
            - "3000:3000"
        entrypoint: docker/entrypoints/rails.sh
        command: ["bundle", "exec", "rails", "s", "-p", "3000", "-b", "0.0.0.0"]
        healthcheck:
            test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000/api"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 30s
        labels:
            - "project=secretaria-ia"
            - "service=chatwoot-web"

    chatwoot-sidekiq:
        <<: *chatwoot-base
        container_name: chatwoot_sidekiq
        command: ["bundle", "exec", "sidekiq", "-C", "config/sidekiq.yml"]
        healthcheck:
            test: ["CMD-SHELL", "pgrep -f sidekiq > /dev/null || exit 1"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 30s
        labels:
            - "project=secretaria-ia"
            - "service=chatwoot-worker"

    evolution-api:
        image: evoapicloud/evolution-api:v2.3.7
        container_name: evolution_api
        restart: unless-stopped
        ports:
            - "${EVOLUTION_API_PORT}:8080"
        env_file: .env
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_healthy
        volumes:
            - evolution_instances:/evolution/instances
            - evolution_store:/evolution/store
        networks:
            - secretaria-net
        deploy:
            resources:
                limits:
                    cpus: "0.5"
                    memory: 512M
        healthcheck:
            test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 20s
        logging:
            <<: *default-logging
        labels:
            - "project=secretaria-ia"
            - "service=whatsapp-gateway"

    n8n:
        image: docker.n8n.io/n8nio/n8n:2.14.2
        container_name: n8n
        restart: unless-stopped
        ports:
            - "${N8N_PORT}:5678"
        env_file: .env
        depends_on:
            postgres:
                condition: service_healthy
        volumes:
            - n8n_data:/home/node/.n8n
            - n8n_files:/files
        networks:
            - secretaria-net
        deploy:
            resources:
                limits:
                    cpus: "1"
                    memory: 1G
        healthcheck:
            test:
                [
                    "CMD",
                    "wget",
                    "--spider",
                    "-q",
                    "http://localhost:5678/healthz",
                ]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 30s
        logging:
            <<: *default-logging
        labels:
            - "project=secretaria-ia"
            - "service=automation"

networks:
    secretaria-net:
        driver: bridge
        labels:
            - "project=secretaria-ia"

volumes:
    postgres_data:
        driver: local
        labels:
            - "project=secretaria-ia"
            - "type=database"
    redis_data:
        driver: local
        labels:
            - "project=secretaria-ia"
            - "type=cache"
    chatwoot_storage:
        driver: local
        labels:
            - "project=secretaria-ia"
            - "type=storage"
    evolution_instances:
        driver: local
        labels:
            - "project=secretaria-ia"
            - "type=whatsapp-sessions"
    evolution_store:
        driver: local
        labels:
            - "project=secretaria-ia"
            - "type=whatsapp-media"
    n8n_data:
        driver: local
        labels:
            - "project=secretaria-ia"
            - "type=workflows"
    n8n_files:
        driver: local
        labels:
            - "project=secretaria-ia"
            - "type=attachments"
